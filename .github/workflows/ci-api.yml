name: API CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "api/functions/**"
      - ".github/workflows/ci-api.yml"
  pull_request:
    branches:
      - main
    paths:
      - "api/functions/**"

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: CI & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: api/functions

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "api/functions/package-lock.json"

      - name: Install dependencies
        run: npm ci

      # Fails the build on high/critical vulnerabilities; moderate (and below)
      # are still printed above but only reported, not fatal.
      - name: Security audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --coverage
        env:
          APP_ENV: test
          FIRESTORE_EMULATOR_HOST: localhost:8080
          JWT_SECRET: ci-test-secret

      - name: Build
        run: npm run build

      - name: Setup Firebase CLI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm install -g firebase-tools

      - name: Write Firebase service account key
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo '${{ secrets.FIREBASE_SA_KEY_STAGING }}' > "$RUNNER_TEMP/firebase-sa-staging.json"

      - name: Deploy to Firebase Staging
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: firebase deploy --project staging --only functions --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa-staging.json

      - name: Notify Deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: |
          echo "✅ Staging deployment successful!"
          echo "Project: utilitool-staging"
          echo "Timestamp: $(date)"
