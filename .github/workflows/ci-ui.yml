name: UI CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "ui/**"
      - ".github/workflows/ci-ui.yml"
  pull_request:
    branches:
      - main
    paths:
      - "ui/**"

concurrency:
  group: ui-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: CI & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "ui/package-lock.json"

      # --ignore-scripts skips the `prepare` script's full Playwright browser
      # download (all browsers, for e2e). Chromium alone is still required
      # below: vitest's browser-mode "client" project (src/**/*.svelte.{test,spec}.ts)
      # runs component tests in a real headless Chromium instance even for
      # plain `npm run test:unit`, not just `test:e2e`.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Svelte-kit sync
        run: npx svelte-kit sync

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Unit tests
        run: npm run test:unit
