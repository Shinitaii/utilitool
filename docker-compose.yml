services:
  api:
    image: node:24-alpine
    container_name: utilitool-api
    working_dir: /app
    ports:
      - "5002:5002"
    environment:
      APP_ENV: dev
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/utilitool-staging-firebase-adminsdk-fbsvc-50221e4bd0.json
    volumes:
      - ./api/functions:/app
      - api_node_modules:/app/node_modules
    # APP_ENV=dev triggers loading of secrets/.env.dev (GCLOUD_PROJECT, GEMINI_API_KEY, etc.)
    # Connects to: utilitool-staging Firebase project
    command: sh -c "npm install && npm run dev:watch"

  ui:
    image: node:24-alpine
    container_name: utilitool-ui
    working_dir: /app
    ports:
      - "5173:5173"
    depends_on:
      - api
    env_file:
      - ./ui/.env
    volumes:
      - ./ui:/app
      - ui_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  api_node_modules:
  ui_node_modules:
