services:
  api:
    image: node:24-alpine
    container_name: utilitool-api
    working_dir: /app
    ports:
      - "5002:5002"
    environment:
      APP_ENV: staging
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/utilitool-staging-firebase-adminsdk-fbsvc-50221e4bd0.json
      # Native fs.watch doesn't reliably see changes made on the Windows host
      # through the WSL2/VirtioFS bind mount — poll instead so hot reload works.
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./api/functions:/app
      - api_node_modules:/app/node_modules
    # APP_ENV=staging loads secrets/.env.staging (GCLOUD_PROJECT, GEMINI_API_KEY, etc.).
    # NODE_ENV=development and START_LOCAL_SERVER are set by the dev:watch script itself.
    # Connects to: utilitool-staging Firebase project
    command: sh -c "npm install && npm run dev:watch -- --poll"

  ui:
    image: node:24-alpine
    container_name: utilitool-ui
    working_dir: /app
    ports:
      - "5173:5173"
    depends_on:
      - api
    env_file:
      - ./ui/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      # ui's `prepare` script normally runs `playwright install`, downloading ~280MB of
      # Chrome builds for E2E — unneeded here since E2E doesn't run in this container.
      SKIP_PLAYWRIGHT_INSTALL: "true"
    volumes:
      - ./ui:/app
      - ui_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host --force"

  mobile:
    image: node:24-alpine
    container_name: utilitool-mobile
    working_dir: /app
    ports:
      - "5174:5174"
    depends_on:
      - api
    env_file:
      - ./mobile/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./mobile:/app
      - mobile_node_modules:/app/node_modules
    # Web preview only (Vite dev server) — the Capacitor/Android build is not containerized.
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  api_node_modules:
  ui_node_modules:
  mobile_node_modules:
