version: "3.8"

services:
  api:
    build:
      context: ./api/functions
      dockerfile: Dockerfile.dev
    container_name: api-dev
    ports:
      - "5002:5002"
    environment:
      - NODE_ENV=development
      - APP_ENV=dev
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/utilitool-staging-firebase-adminsdk-fbsvc-6a77170d3f.json
    volumes:
      - ./api/functions/src:/app/src
      - ./api/functions/secrets:/app/secrets
      - ./api/functions/lib:/app/lib
    command: npm run dev:watch
    # Requires: api/functions/secrets/.env.dev
    # Connects to: utilitool-staging Firebase project

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile.dev
    container_name: ui-dev
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://api:5002
    volumes:
      - ./ui/src:/app/src
      - ./ui/lib:/app/lib # Node modules cache
    command: npm run dev -- --host
